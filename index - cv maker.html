@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f0f0ec;--white:#fff;--dark:#111;--mid:#888;--light:#d8d8d0;--accent:#3d3dff;--accent-l:#ebebff}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 16px 60px}
.langbar{width:100%;max-width:480px;display:flex;justify-content:flex-end;gap:8px;padding:16px 0 8px}
.langbtn{background:none;border:1.5px solid var(--light);border-radius:20px;padding:4px 14px;font-family:inherit;font-size:12px;font-weight:600;color:var(--mid);cursor:pointer;transition:.2s}
.langbtn.active{background:var(--dark);border-color:var(--dark);color:#fff}
.header{width:100%;max-width:480px;padding:24px 0 18px}
.hlabel{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--mid);margin-bottom:8px}
.header h1{font-family:'DM Serif Display',Georgia,serif;font-size:34px;line-height:1.1;color:var(--dark);font-weight:400}
.progwrap{width:100%;max-width:480px;margin-bottom:20px}
.proginfo{display:flex;justify-content:space-between;font-size:12px;color:var(--mid);margin-bottom:7px;font-weight:500}
.progbar{height:4px;background:var(--light);border-radius:4px;overflow:hidden}
.progfill{height:100%;background:var(--accent);border-radius:4px;transition:width .4s}
.card{width:100%;max-width:480px;background:var(--white);border-radius:16px;box-shadow:0 2px 18px rgba(0,0,0,.07);overflow:hidden}
.chead{padding:24px 24px 0}
.icon{width:42px;height:42px;background:var(--accent-l);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;margin-bottom:14px}
.chead h2{font-family:'DM Serif Display',Georgia,serif;font-size:21px;font-weight:400;color:var(--dark);margin-bottom:4px}
.chead p{font-size:13px;color:var(--mid);line-height:1.5}
.body{padding:18px 24px 22px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--mid);margin-bottom:7px}
.field input,.field textarea,.field select{width:100%;padding:12px 14px;border:1.5px solid var(--light);border-radius:10px;font-family:inherit;font-size:15px;color:var(--dark);background:#fff;outline:none;transition:.2s;appearance:none;-webkit-appearance:none}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(61,61,255,.08)}
.field textarea{min-height:90px;line-height:1.6;resize:vertical}
.field .err-input{border-color:#e53e3e}
.err{color:#e53e3e;font-size:13px;font-weight:600;margin-top:5px;padding:4px 8px;background:#fff0f0;border-radius:6px;border-left:3px solid #e53e3e}
.charcount{font-size:11px;color:#ccc;text-align:right;margin-top:3px}
.photobox{border:2px dashed var(--light);border-radius:12px;padding:22px;text-align:center;cursor:pointer;transition:.2s}
.photobox:hover{border-color:var(--accent);background:var(--accent-l)}
.photobox input{display:none}
.photoimg{width:80px;height:80px;border-radius:50%;object-fit:cover;margin:0 auto 8px;display:block;border:3px solid var(--accent-l)}
.li{background:#fafaf8;border:1.5px solid var(--light);border-radius:10px;padding:14px;margin-bottom:10px;position:relative}
.li .rm{position:absolute;top:10px;right:10px;background:none;border:none;font-size:17px;color:#bbb;cursor:pointer;line-height:1}
.add{width:100%;padding:12px;border:1.5px dashed var(--light);border-radius:10px;background:none;font-family:inherit;font-size:14px;color:var(--accent);font-weight:600;cursor:pointer;margin-top:4px}
.add:hover{background:var(--accent-l);border-color:var(--accent)}
.daterow{display:flex;gap:6px;align-items:center}
.datecol{display:flex;flex-direction:column}
.datecol .fac{font-size:9px;color:#bbb;margin-bottom:2px;text-align:center;font-style:italic}
.pill{padding:5px 13px;border-radius:20px;border:1.5px solid var(--light);font-size:12px;font-weight:500;color:var(--mid);cursor:pointer;transition:.2s;user-select:none}
.pill.sel{background:var(--dark);border-color:var(--dark);color:#fff}

.bback{flex:1;padding:14px;border:1.5px solid var(--light);border-radius:10px;background:none;font-family:inherit;font-size:15px;font-weight:600;color:var(--dark);cursor:pointer}
.bnext{flex:2;padding:14px;border:none;border-radius:10px;background:var(--dark);font-family:inherit;font-size:15px;font-weight:600;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}

body.rtl{direction:rtl}

.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}

// ─── UTILS ───────────────────────────────────────────────
function fmtPeriod(v,lang){
  if(!v)return"";var ms=MONTHS[lang]||MONTHS.fr;
  var pres=lang==="ar"?"حتى الآن":lang==="en"?"Present":"PRÉSENT";
  var s=[v.day?v.day:"",v.month?ms[parseInt(v.month)-1]:"",v.year].filter(Boolean).join(" ");
  if(v.present)return s?s.toUpperCase()+" — "+pres:pres;
  var e=[v.endDay?v.endDay:"",v.endMonth?ms[parseInt(v.endMonth)-1]:"",v.endYear].filter(Boolean).join(" ");
  if(s&&e)return s.toUpperCase()+" / "+e.toUpperCase();
  return(s||e).toUpperCase();
}
function fmtDOB(v){if(!v)return"";return[v.day,v.month,v.year].filter(Boolean).join("/")}
function okPhone(v){var d=(v||"").replace(/[\s.\-+()\u00A0]/g,"");return d.length>=8&&d.length<=15&&/^\d+$/.test(d)}
function okLinkedin(v){
  if(!v)return true; // optionnel
  return /linkedin\.com\/in\//i.test(v);
}
function okEmail(v){
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v||""))return false;
  var known=["gmail","hotmail","yahoo","outlook","icloud","live","msn","free","orange","sfr","laposte","wanadoo","bbox","protonmail","pm","tutanota","aol","gmx","yandex","mail","ovh","me"];
  var domain=(v||"").split("@")[1]||"";var base=domain.split(".")[0].toLowerCase();
  return known.indexOf(base)!==-1;
}
function okPeriod(v){
  if(!v||v.present)return true;
  if(!v.year||!v.endYear)return true;
  var sy=parseInt(v.year),ey=parseInt(v.endYear);
  if(sy>ey)return false;
  if(sy===ey&&v.month&&v.endMonth)return parseInt(v.month)<=parseInt(v.endMonth);
  return true;
}

function getEndYear(item) {
  // Présent = 9999
  if (item.period && item.period.present) return 9999;
  if (item.period && item.period.endPresent) return 9999;
  // Expériences pro
  if (item.period && item.period.endYear) return parseInt(item.period.endYear);
  // Expériences sportives
  if (item.period && item.period.endYear) return parseInt(item.period.endYear);
  // Scolarité (pas de fin, utiliser l'année)
  if (item.year) return parseInt(item.year);
  return 0;
}
function getEndMonth(item) {
  if (item.period && item.period.present) return 12;
  if (item.period && item.period.endPresent) return 12;
  if (item.period && item.period.endMonth) return parseInt(item.period.endMonth);
  return 0;
}
function getStartYear(item) {
  if (item.period && item.period.year) return parseInt(item.period.year);
  if (item.period && item.period.startYear) return parseInt(item.period.startYear);
  if (item.year) return parseInt(item.year);
  return 0;
}
function sortDesc(arr) {
  return arr.slice().sort(function(a, b) {
    var ya = getEndYear(a), yb = getEndYear(b);
    if (yb !== ya) return yb - ya;
    var ma = getEndMonth(a), mb = getEndMonth(b);
    if (mb !== ma) return mb - ma;
    // Égalité de fin : trier par début
    return getStartYear(b) - getStartYear(a);
  });
}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

  if(data.phone)cl+='<div style="margin-bottom:12px;display:flex;gap:8px;align-items:flex-start"><span style="font-size:17px">📞</span><strong style="font-size:'+sf+'px">'+esc(data.phone)+'</strong></div>';

  if(cl)side+='<div style="margin-bottom:32px">'+ssep(L2.contact)+'<div>'+cl+'</div></div>';
  var ci="";
  interests.forEach(function(x){

    else ci+='<div style="font-size:'+sf+'px;color:#444;line-height:1.9;margin-bottom:8px">'+esc(x.value)+'</div>';

  return'<div style="display:flex;width:794px;min-height:'+PAGE_H+'px;background:white;font-family:Helvetica,Arial,sans-serif">'
    +'<div style="width:264px;min-width:264px;background:#f2f2ee;padding:36px 22px;min-height:'+PAGE_H+'px">'+side+'</div>'

    +'<div style="font-size:56px;font-weight:300;letter-spacing:0.07em;color:#111;line-height:1">'+esc(fullName)+'</div>'
    +'<div style="width:64px;height:2px;background:#bbb;margin-top:20px"></div>'+main+'</div></div>';

// ─── ÉTAT ───────────────────────────────────────────────
var state={lang:"fr",step:0,photo:null,generated:false,errors:{},
  data:{firstName:"",lastName:"",dob:null,jobTitle:"",email:"",phone:"",city:"",linkedin:"",bio:"",experiences:[],education:[],sportExp:[],skills:[],languages:[],interests:[]}};

function L(){return T[state.lang]}
// setF SANS render — préserve le focus clavier sur mobile
function setF(id,v){state.data[id]=v;if(state.errors[id]){delete state.errors[id];var el=document.getElementById("err_"+id);if(el)el.style.display="none";var inp=document.getElementById("fld_"+id);if(inp)inp.classList.remove("err-input")}updateCharCount(id,v)}
function setLst(lid,v){state.data[lid]=v;render()}
function updateCharCount(id,v){var el=document.getElementById("cc_"+id);if(el){var max=el.getAttribute("data-max");el.textContent=(v||"").length+"/"+max}}

function validate(){
  var errs={};var cur=L().steps[state.step];
  if(!cur.type&&cur.fields){
    cur.fields.forEach(function(f){
      var v=state.data[f.id];
      if(f.type==="date"){if(f.req){var dv=v||{};if(!dv.day||!dv.month||!dv.year)errs[f.id]=L().err.dob}}
      else{
        if(f.req&&!v)errs[f.id]=L().err.req;
        if(f.val==="phone"&&v&&!okPhone(v))errs[f.id]=L().err.phone;
        if(f.val==="email"&&v&&!okEmail(v))errs[f.id]=L().err.email;
      }
    });
  }
  if(cur.type==="langlist"){(state.data.languages||[]).forEach(function(l,i){if(l.name&&!l.level)errs["lang_level_"+i]=true})}
  if(cur.type==="list"&&cur.listId==="sportExp"){
    (state.data.sportExp||[]).forEach(function(s,i){
      var sv=s.period||{};
      if(!sv.startMonth||!sv.startYear)errs["sport_start_"+i]=L().err.sportStart;
      if(!sv.endPresent&&(!sv.endMonth||!sv.endYear))errs["sport_end_"+i]=L().err.sportEnd;
      if(!errs["sport_start_"+i]&&!errs["sport_end_"+i]&&!sv.endPresent&&sv.startYear&&sv.endYear&&parseInt(sv.startYear)>parseInt(sv.endYear))
        errs["sport_chrono_"+i]=L().err.sportChrono;
    });
  }
  if(cur.type==="list"&&cur.listId==="experiences"){
    (state.data.experiences||[]).forEach(function(e,i){
      var p=e.period||{};
      if(!p.month||!p.year)errs["exp_ps_"+i]=true;
      if(!p.present&&(!p.endMonth||!p.endYear))errs["exp_pe_"+i]=true;
      if(!p.present&&!errs["exp_ps_"+i]&&!errs["exp_pe_"+i]&&!okPeriod(p))errs["exp_chrono_"+i]=L().err.expChrono;
    });
  }
  state.errors=errs;
  return Object.keys(errs).length===0;
}
function showErrors(){
  Object.keys(state.errors).forEach(function(k){
    var el=document.getElementById("err_"+k);
    if(el){el.style.display="block";el.style.color="#e53e3e";el.style.fontWeight="600"}
    var inp=document.getElementById("fld_"+k);
    if(inp)inp.style.borderColor="#e53e3e";
  });
}

function onNext(){if(validate()){state.step++;render();window.scrollTo({top:0,behavior:"smooth"})}else{render();requestAnimationFrame(showErrors)}}
function onBack(){state.step--;render();window.scrollTo({top:0,behavior:"smooth"})}
function onGenerate(){if(validate()){state.generated=true;render();window.scrollTo({top:0,behavior:"smooth"})}else{render();requestAnimationFrame(showErrors)}}

function renderCVtoNode(){

  return node.firstChild;
}
function downloadPNG(){
  var btn=document.getElementById("btn-png");var orig=btn.innerHTML;btn.innerHTML='<span class="spinner"></span>';
  var el=renderCVtoNode();
  cropPhotoToSquare(function(){
    html2canvas(el,{scale:2,useCORS:true,backgroundColor:"#ffffff"}).then(function(canvas){
      var link=document.createElement("a");
      link.download="CV_"+(state.data.firstName||"mon")+"_"+(state.data.lastName||"cv")+".png";
      link.href=canvas.toDataURL("image/png");
      document.body.appendChild(link);link.click();document.body.removeChild(link);
      btn.innerHTML=orig;
    }).catch(function(){btn.innerHTML=orig});
  });
}
function cropPhotoToSquare(callback){
  // Trouve l'image dans cv-render et la recadre en carré avant capture
  var img = document.querySelector('#cv-render img');
  if(!img){ callback(); return; }
  var size = 260; // 130px * 2 (DPR)
  var canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  var ctx = canvas.getContext('2d');
  var sw = img.naturalWidth, sh = img.naturalHeight;
  var side = Math.min(sw, sh);
  var sx = (sw - side) / 2, sy = (sh - side) / 2;
  ctx.drawImage(img, sx, sy, side, side, 0, 0, size, size);
  img.src = canvas.toDataURL('image/jpeg', 0.95);
  img.onload = callback;
  if(img.complete) callback();
}
function downloadPDF(){
  var btn=document.getElementById("btn-pdf");var orig=btn.innerHTML;btn.innerHTML='<span class="spinner"></span>';
  var el=renderCVtoNode();
  cropPhotoToSquare(function(){
    html2canvas(el,{scale:2,useCORS:true,backgroundColor:"#ffffff"}).then(function(canvas){
      var jsPDF=window.jspdf.jsPDF;
      var pdf=new jsPDF({unit:"px",format:[canvas.width,canvas.height]});
      pdf.addImage(canvas.toDataURL("image/jpeg",0.95),"JPEG",0,0,canvas.width,canvas.height);
      pdf.save("CV_"+(state.data.firstName||"mon")+"_"+(state.data.lastName||"cv")+".pdf");
      btn.innerHTML=orig;
    }).catch(function(){btn.innerHTML=orig});
  });
}

    h+='<div class="daterow"><div class="datecol" style="flex:0 0 58px"><span class="fac">'+l.fac+'</span>'+sel("endDay",l.jj,dayOptsE)+'</div><div style="flex:1">'+sel("endMonth",l.mois,monOptsE)+'</div><div style="flex:0 0 84px">'+sel("endYear",l.annee,yrOptsE)+'</div></div>';
  }
  h+='<label style="display:flex;align-items:center;gap:6px;margin-top:8px;font-size:13px;color:#666;cursor:pointer"><input type="checkbox" '+(v.present?"checked":"")+' onchange="updateWork('+i+',\''+fid+'\',\'present\',this.checked)">'+l.present+'</label>';
  if(state.errors["exp_chrono_"+i])h+='<div class="err" style="display:block">'+state.errors["exp_chrono_"+i]+'</div>';
  else if(err)h+='<div class="err">'+l.err.period+'</div>';
  h+='</div>';
  return h;
}
function updateWork(i,fid,key,val){
  var items=state.data.experiences.slice();var v=items[i][fid]||{};
  if(key==="present"){v.present=val;if(val){v.endMonth="";v.endYear="";v.endDay=""}}else{v[key]=val}
  items[i][fid]=v;state.data.experiences=items;
  delete state.errors["exp_ps_"+i];delete state.errors["exp_pe_"+i];delete state.errors["exp_chrono_"+i];
  render();
}

function listBlock(lid,lf){
  var l=L();var items=state.data[lid]||[];var h="";
  items.forEach(function(it,i){
    h+='<div class="li"><button class="rm" onclick="removeItem(\''+lid+'\','+i+')">×</button>';
    lf.forEach(function(f){
      if(f.type==="workdate"){h+=workdate(lid,i,f.id);return}
      if(f.type==="yearonly"){
        h+='<div class="field"><label>'+f.label+'</label><select onchange="updateItem(\''+lid+'\','+i+',\''+f.id+'\',this.value)"><option value="">—</option>'+YEARS.map(function(y){return'<option '+(it[f.id]===y?"selected":"")+'>'+y+'</option>'}).join("")+'</select></div>';
        return;
      }
      if(f.type==="sportdate"){
        var sv=it[f.id]||{};var ms=MONTHS[state.lang]||MONTHS.fr;
        var l2=L();
        var chronoErr=(sv.startYear&&sv.endYear&&!sv.endPresent&&parseInt(sv.startYear)>parseInt(sv.endYear));
        var mOpts=ms.map(function(m,k){var v2=String(k+1).padStart(2,"0");return'<option value="'+v2+'" '+(sv.startMonth===v2?"selected":"")+'>'+m+'</option>'}).join("");
        var yOpts=YEARS.map(function(y){return'<option '+(sv.startYear===y?"selected":"")+'>'+y+'</option>'}).join("");
        var emOpts=ms.map(function(m,k){var v2=String(k+1).padStart(2,"0");return'<option value="'+v2+'" '+(sv.endMonth===v2?"selected":"")+'>'+m+'</option>'}).join("");
        var eyOpts=YEARS.map(function(y){return'<option '+(sv.endYear===y?"selected":"")+'>'+y+'</option>'}).join("");
        h+='<div class="field"><label>'+f.label+'</label>';
        h+='<div style="font-size:10px;color:#bbb;font-style:italic;margin-bottom:4px">'+(l2.debut||"Début")+'</div>';
        h+='<div style="display:flex;gap:6px;margin-bottom:8px">';
        h+='<select style="flex:1;padding:11px 12px;border:1.5px solid #d8d8d0;border-radius:9px;font-family:inherit;font-size:14px;appearance:none;-webkit-appearance:none;background:#fff" onchange="updateSportDate(\''+lid+'\','+i+',\'startMonth\',this.value)"><option value="">'+(l2.mois||"Mois")+'</option>'+mOpts+'</select>';
        h+='<select style="flex:0 0 84px;padding:11px 12px;border:1.5px solid #d8d8d0;border-radius:9px;font-family:inherit;font-size:14px;appearance:none;-webkit-appearance:none;background:#fff" onchange="updateSportDate(\''+lid+'\','+i+',\'startYear\',this.value)"><option value="">'+(l2.annee||"Année")+'</option>'+yOpts+'</select>';
        h+='</div>';
        if(!sv.endPresent){
          h+='<div style="font-size:10px;color:#bbb;font-style:italic;margin-bottom:4px">'+(l2.fin||"Fin")+'</div>';
          h+='<div style="display:flex;gap:6px">';
          h+='<select style="flex:1;padding:11px 12px;border:1.5px solid #d8d8d0;border-radius:9px;font-family:inherit;font-size:14px;appearance:none;-webkit-appearance:none;background:#fff" onchange="updateSportDate(\''+lid+'\','+i+',\'endMonth\',this.value)"><option value="">'+(l2.mois||"Mois")+'</option>'+emOpts+'</select>';
          h+='<select style="flex:0 0 84px;padding:11px 12px;border:1.5px solid #d8d8d0;border-radius:9px;font-family:inherit;font-size:14px;appearance:none;-webkit-appearance:none;background:#fff" onchange="updateSportDate(\''+lid+'\','+i+',\'endYear\',this.value)"><option value="">'+(l2.annee||"Année")+'</option>'+eyOpts+'</select>';
          h+='</div>';
        }
        h+='<label style="display:flex;align-items:center;gap:6px;margin-top:8px;font-size:13px;color:#666;cursor:pointer"><input type="checkbox" '+(sv.endPresent?"checked":"")+' onchange="updateSportDate(\''+lid+'\','+i+',\'endPresent\',this.checked)">'+(l2.present||"Présent")+'</label>';
        var sportStartErr=state.errors["sport_start_"+i];
        var sportEndErr=state.errors["sport_end_"+i];
        var sportChronoErr=state.errors["sport_chrono_"+i];
        if(sportStartErr)h+='<div class="err" style="display:block;margin-top:4px">'+sportStartErr+'</div>';
        if(sportEndErr)h+='<div class="err" style="display:block;margin-top:4px">'+sportEndErr+'</div>';
        if(sportChronoErr)h+='<div class="err" style="display:block;margin-top:4px">'+sportChronoErr+'</div>';
        h+='</div>';
        return;
      }
      h+='<div class="field"><label>'+f.label+(f.req?" *":"")+'</label><input type="text" placeholder="'+(f.ph||"")+'" maxlength="'+(f.max||100)+'" value="'+(it[f.id]||"").replace(/"/g,"&quot;")+'" oninput="updateItem(\''+lid+'\','+i+',\''+f.id+'\',this.value)"></div>';
    });
    h+='</div>';
  });
  h+='<button class="add" onclick="addItem(\''+lid+'\')">'+l.addMore+'</button>';
  return h;
}
function addItem(lid){var cur=L().steps[state.step];var lf=cur.listFields||[];if(lid==="languages"){state.data.languages=(state.data.languages||[]).concat([{name:"",level:""}]);render();return}var b={};lf.forEach(function(f){b[f.id]=""});state.data[lid]=(state.data[lid]||[]).concat([b]);render()}
function removeItem(lid,i){var n=state.data[lid].slice();n.splice(i,1);state.data[lid]=n;render()}
function updateItem(lid,i,fid,val){var n=state.data[lid].slice();n[i][fid]=val;state.data[lid]=n}
function updateSportDate(lid,i,key,val){
  var n=state.data[lid].slice();
  var sv=n[i].period||{};
  if(key==="endPresent"){sv.endPresent=val;if(val){sv.endMonth="";sv.endYear=""}}else{sv[key]=val}
  n[i].period=sv;state.data[lid]=n;delete state.errors['sport_start_'+i];delete state.errors['sport_end_'+i];delete state.errors['sport_chrono_'+i];render();
}

function langBlock(){
  var l=L();var items=state.data.languages||[];var h="";
  items.forEach(function(it,i){
    h+='<div class="li"><button class="rm" onclick="removeItem(\'languages\','+i+')">×</button>';
    h+='<div class="field"><label>'+l.langue+'</label><input type="text" placeholder="Anglais / English" maxlength="40" value="'+(it.name||"").replace(/"/g,"&quot;")+'" oninput="updateItem(\'languages\','+i+',\'name\',this.value)"></div>';
    h+='<div class="field"><label>'+l.niveau+' *</label>'+(state.errors["lang_level_"+i]?'<div class="err" style="margin-bottom:4px">'+l.err.langLevel+'</div>':"")+'<div style="display:flex;gap:6px;flex-wrap:wrap">';
    l.levels.forEach(function(lv){h+='<div class="pill '+(it.level===lv?"sel":"")+'" onclick="setLevel('+i+',\''+lv+'\')">'+lv+'</div>'});
    h+='</div></div></div>';
  });
  h+='<button class="add" onclick="addItem(\'languages\')">'+l.addMore+'</button>';
  return h;
}
function setLevel(i,lv){var n=state.data.languages.slice();n[i].level=lv;state.data.languages=n;delete state.errors["lang_level_"+i];render()}

function render(){
  var l=L();document.body.className=state.lang==="ar"?"rtl":"";var app=document.getElementById("app");

  if(state.generated){
    var cvHTML=buildCV(state.data,state.photo,state.lang);
    var scale=480/794;var scaledH=Math.round(1123*scale);
    app.innerHTML=
      '<div class="langbar">'+["fr","en","ar"].map(function(lc){return'<button class="langbtn '+(state.lang===lc?"active":"")+'" onclick="setLang(\''+lc+'\')">'+lc.toUpperCase()+'</button>'}).join("")+'</div>'+
      '<div class="header"><div class="hlabel">✅ '+l.cvReady+'</div><h1>'+l.cvHere+'</h1></div>'+
      '<div style="width:100%;max-width:480px;background:var(--accent-l);border-radius:10px;padding:12px 16px;font-size:13px;color:#444;margin-bottom:14px;line-height:1.6">'+l.genHint+'</div>'+
      '<div class="dlbtns"><button class="dlbtn pdf" id="btn-pdf" onclick="downloadPDF()">'+l.dlPdf+'</button><button class="dlbtn png" id="btn-png" onclick="downloadPNG()">'+l.dlPng+'</button></div>'+
      '<div class="cvframe" style="height:'+scaledH+'px"><div style="transform:scale('+scale+');transform-origin:top left;width:794px;height:1123px;pointer-events:none">'+cvHTML+'</div></div>'+
      '<button class="restart" onclick="restart()">'+l.restart+'</button>';
    return;
  }

  var total=l.steps.length;var pct=Math.round(((state.step+1)/total)*100);var cur=l.steps[state.step];var isLast=state.step===total-1;
  var bodyHTML="";
  if(cur.type==="list")bodyHTML=listBlock(cur.listId,cur.listFields);
  else if(cur.type==="langlist")bodyHTML=langBlock();
  else bodyHTML=cur.fields.map(field).join("");

  app.innerHTML=
    '<div class="langbar">'+["fr","en","ar"].map(function(lc){return'<button class="langbtn '+(state.lang===lc?"active":"")+'" onclick="setLang(\''+lc+'\')">'+lc.toUpperCase()+'</button>'}).join("")+'</div>'+
    '<div class="header"><div class="hlabel">'+l.hdrLabel+'</div><h1>'+l.hdrTitle[0]+'<br>'+l.hdrTitle[1]+'</h1></div>'+
    '<div class="progwrap"><div class="proginfo"><span>'+l.stepOf(state.step+1,total)+'</span><span>'+pct+'%</span></div><div class="progbar"><div class="progfill" style="width:'+pct+'%"></div></div></div>'+
    '<div class="card"><div class="chead"><div class="icon">'+cur.icon+'</div><h2>'+cur.title+'</h2><p>'+cur.sub+'</p></div>'+
    '<div class="body">'+bodyHTML+'</div>'+
    '<div class="nav">'+(state.step>0?'<button class="bback" onclick="onBack()">'+l.back+'</button>':"")+
    '<button class="bnext '+(isLast?"gen":"")+'" style="'+(state.step===0?"flex:3":"")+'" onclick="'+(isLast?"onGenerate()":"onNext()")+'">'+(isLast?"📄 "+l.generate:l.next)+'</button></div></div>';
}

function setLang(lc){state.lang=lc;render()}
function restart(){state.generated=false;state.step=0;render()}

render();
</script>
</body>
</html>
